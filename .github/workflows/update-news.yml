name: Update Naver News

on:
  # 1) 정해진 시간마다 자동 실행 (cron은 UTC 기준입니다)
  #    아래는 "매시간 0분"에 실행하는 설정입니다.
  #    매일 한 번만 원하면 이 줄을 예: "0 22 * * *" 로 바꾸세요.
  #    (UTC 22:00 = 한국시간(KST) 다음날 07:00)
  schedule:
    - cron: "0 * * * *"

  # 2) Actions 탭에서 "Run workflow" 버튼으로 수동 실행도 가능하게 함
  #    force_run을 true로 보내면 갱신 주기를 무시하고 즉시 수집합니다.
  workflow_dispatch:
    inputs:
      force_run:
        description: "갱신 주기를 무시하고 즉시 수집"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 뉴스 가져오기
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: python scripts/fetch_news.py

      - name: 변경사항 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "뉴스 자동 업데이트 (${{ github.run_id }})"
          file_pattern: data/news.json
