<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>네이버 뉴스 자동 수집기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6F3EC;
    --paper-dim: #EFEADD;
    --ink: #1B1A17;
    --ink-soft: #46433C;
    --rule: #D8D2C4;
    --rule-strong: #1B1A17;
    --live: #03C75A;
    --alert: #B23A2F;
    --meta: #8C8775;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: inherit; text-decoration: none; }

  .wrap{
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ---------- 마스트헤드 ---------- */
  .masthead{
    display:flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    padding-bottom: 14px;
  }
  .masthead h1{
    font-family: "Noto Serif KR", serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 44px);
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .masthead .kicker{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--meta);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  .status{
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.6;
  }
  .status .dot-row{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap: 6px;
  }
  .dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(3,199,90,0.6);
    animation: pulse 2.2s infinite;
  }
  .dot.off{ background: var(--meta); animation: none; }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(3,199,90,0.45); }
    70%{ box-shadow: 0 0 0 7px rgba(3,199,90,0); }
    100%{ box-shadow: 0 0 0 0 rgba(3,199,90,0); }
  }

  .rule-double{
    border: none;
    border-top: 2px solid var(--rule-strong);
    border-bottom: 1px solid var(--rule-strong);
    height: 3px;
    margin: 0 0 18px;
  }

  /* ---------- 섹션 탭 ---------- */
  .tabs{
    display:flex;
    gap: 22px;
    overflow-x: auto;
    padding-bottom: 12px;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--rule);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--meta);
    background: none;
    border: none;
    padding: 4px 2px 12px;
    cursor: pointer;
    white-space: nowrap;
    position: relative;
  }
  .tab[aria-selected="true"]{
    color: var(--ink);
  }
  .tab[aria-selected="true"]::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height: 2px;
    background: var(--ink);
  }
  .tab:focus-visible{ outline: 2px solid var(--live); outline-offset: 3px; }
  .tab .count{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--meta);
    margin-left: 4px;
  }

  /* ---------- 기사 목록 ---------- */
  .list{ margin-top: 6px; }
  .item{
    display:grid;
    grid-template-columns: 34px 1fr;
    gap: 14px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .item:hover .headline{ text-decoration: underline; text-decoration-color: var(--rule-strong); }
  .idx{
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--meta);
    padding-top: 3px;
  }
  .headline{
    font-family: "Noto Serif KR", serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.4;
    display: block;
    margin-bottom: 6px;
  }
  .desc{
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .meta-line{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px;
    color: var(--meta);
    display:flex;
    gap: 10px;
    align-items: center;
  }
  .meta-line .src{
    color: var(--ink-soft);
    font-weight: 500;
  }
  .meta-line .sep{ color: var(--rule); }

  /* ---------- 빈 상태 ---------- */
  .empty{
    margin-top: 40px;
    padding: 40px 20px;
    text-align: center;
    border: 1px dashed var(--rule);
    background: var(--paper-dim);
  }
  .empty .stamp{
    display:inline-block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--alert);
    border: 1px solid var(--alert);
    padding: 4px 10px;
    transform: rotate(-2deg);
    margin-bottom: 14px;
  }
  .empty p{
    font-family: "Noto Serif KR", serif;
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  footer{
    margin-top: 50px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--meta);
    display:flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 480px){
    .masthead{ flex-direction: column; align-items: flex-start; }
    .status{ text-align: left; }
    .status .dot-row{ justify-content: flex-start; }
    .item{ grid-template-columns: 24px 1fr; }
    .headline{ font-size: 16.5px; }
  }

  /* ---------- 설정 토글 버튼 ---------- */
  .settings-toggle{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    padding: 5px 10px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .settings-toggle:hover{ background: var(--ink); color: var(--paper); }
  .settings-toggle:focus-visible{ outline: 2px solid var(--live); outline-offset: 2px; }

  /* ---------- 오버레이 ---------- */
  .backdrop{
    position: fixed; inset: 0;
    background: rgba(27,26,23,0.45);
    z-index: 40;
  }

  /* ---------- 사이드바 ---------- */
  .sidebar{
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: min(340px, 88vw);
    background: var(--paper);
    border-right: 1px solid var(--rule-strong);
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    z-index: 50;
    padding: 20px;
    overflow-y: auto;
    box-shadow: 6px 0 24px rgba(0,0,0,0.12);
  }
  .sidebar.open{ transform: translateX(0); }

  .sidebar-head{
    display:flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--rule-strong);
    padding-bottom: 12px;
    margin-bottom: 18px;
  }
  .sidebar-head h2{
    font-family: "Noto Serif KR", serif;
    font-size: 20px;
    margin: 0;
  }
  .icon-btn{
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--ink-soft); padding: 4px;
  }
  .icon-btn:focus-visible{ outline: 2px solid var(--live); }

  .settings-section{ margin-bottom: 24px; }
  .settings-section h3{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--meta);
    margin: 0 0 10px;
  }

  #tokenConnected .conn-ok{
    font-size: 13px; color: var(--live); font-weight: 600;
    margin: 0 0 10px;
  }
  .sidebar label{
    display:block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .sidebar input[type="text"],
  .sidebar input[type="password"],
  .sidebar select{
    width: 100%;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13px;
    padding: 9px 10px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink);
    margin-bottom: 8px;
    box-sizing: border-box;
  }
  .sidebar input:focus-visible, .sidebar select:focus-visible{
    outline: 2px solid var(--live); outline-offset: 1px;
  }
  .hint{
    font-size: 11.5px;
    color: var(--meta);
    line-height: 1.6;
    margin: 6px 0 0;
  }
  .hint a{ color: var(--ink-soft); text-decoration: underline; }

  .chips{
    display:flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 10px;
  }
  .chip{
    display:inline-flex; align-items:center; gap: 6px;
    background: var(--paper-dim);
    border: 1px solid var(--rule);
    font-size: 12.5px;
    padding: 5px 6px 5px 10px;
  }
  .chip button{
    background:none; border:none; cursor:pointer;
    color: var(--meta); font-size: 11px; padding: 2px;
  }
  .chip button:hover{ color: var(--alert); }
  .add-row{ display:flex; gap: 6px; }
  .add-row input{ flex:1; margin-bottom:0; }
  .add-row button{ flex-shrink: 0; }

  .btn-primary, .btn-secondary{
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 14px;
    cursor: pointer;
    border: 1px solid var(--rule-strong);
  }
  .btn-primary{ background: var(--ink); color: var(--paper); }
  .btn-primary:hover:not(:disabled){ background: var(--ink-soft); }
  .btn-secondary{ background: none; color: var(--ink); }
  .btn-secondary:hover:not(:disabled){ background: var(--paper-dim); }
  .btn-primary:disabled, .btn-secondary:disabled{
    opacity: 0.4; cursor: not-allowed;
  }
  .full{ width: 100%; }

  .sidebar-actions{
    display:flex; flex-direction: column; gap: 8px;
    margin-top: 28px;
  }
  .status-msg{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px;
    min-height: 14px;
    margin-top: 12px;
    line-height: 1.5;
  }
  .status-msg.success{ color: var(--live); }
  .status-msg.error{ color: var(--alert); }
  .status-msg.info{ color: var(--meta); }
</style>
</head>
<body>

<div class="wrap">

  <div class="masthead">
    <div>
      <button class="settings-toggle" id="openSidebar" aria-haspopup="true" aria-controls="sidebar">⚙ 설정</button>
      <p class="kicker" id="dateLine">—</p>
      <h1>네이버 뉴스 자동 수집기</h1>
    </div>
    <div class="status">
      <div class="dot-row"><span class="dot" id="liveDot"></span><span id="liveLabel">대기 중</span></div>
      <div id="updatedAt">마지막 업데이트: -</div>
    </div>
  </div>
  <hr class="rule-double" />

  <nav class="tabs" id="tabs" role="tablist" aria-label="섹션 선택"></nav>

  <main class="list" id="list"></main>

  <div class="empty" id="emptyState" hidden>
    <span class="stamp">대기 중</span>
    <p>아직 수집된 뉴스가 없습니다.<br>GitHub Actions가 처음 실행되면 이 화면에 자동으로 채워집니다.</p>
  </div>

  <footer>
    <span>데이터 출처: 네이버 뉴스 검색 오픈API</span>
    <span id="cadenceLine">갱신 주기: 워크플로우 설정값 기준</span>
  </footer>

</div>

<div class="backdrop" id="backdrop" hidden></div>
<aside class="sidebar" id="sidebar" aria-hidden="true">
  <div class="sidebar-head">
    <h2>설정</h2>
    <button class="icon-btn" id="closeSidebar" aria-label="설정 닫기">✕</button>
  </div>

  <section class="settings-section">
    <h3>GitHub 연결</h3>
    <div id="tokenConnected" hidden>
      <p class="conn-ok">● 연결됨</p>
      <button class="btn-secondary full" id="disconnectBtn">연결 해제</button>
    </div>
    <div id="tokenForm">
      <label for="tokenInput">Personal Access Token</label>
      <input type="password" id="tokenInput" placeholder="github_pat_..." autocomplete="off" spellcheck="false" />
      <button class="btn-primary full" id="connectBtn">연결</button>
      <p class="hint">
        <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener noreferrer">토큰 발급받기 ↗</a><br>
        이 저장소만 선택, Contents·Actions 권한을 "Read and write"로 설정하세요.
      </p>
    </div>
  </section>

  <section class="settings-section">
    <h3>검색 키워드</h3>
    <div class="chips" id="keywordChips"></div>
    <div class="add-row">
      <input type="text" id="keywordInput" placeholder="새 검색어 입력 후 Enter" />
      <button class="btn-secondary" id="addKeywordBtn">추가</button>
    </div>
  </section>

  <section class="settings-section">
    <h3>업데이트 주기</h3>
    <select id="intervalSelect">
      <option value="1">1시간마다</option>
      <option value="2">2시간마다</option>
      <option value="4">4시간마다</option>
      <option value="6">6시간마다</option>
      <option value="12">12시간마다</option>
      <option value="24">24시간마다 (하루 1번)</option>
    </select>
  </section>

  <div class="sidebar-actions">
    <button class="btn-primary full" id="saveSettingsBtn" disabled>저장하기</button>
    <button class="btn-secondary full" id="runNowBtn" disabled>지금 바로 실행</button>
  </div>

  <p class="status-msg" id="settingsStatus" role="status"></p>
</aside>

<script>
  const DATA_URL = "./data/news.json";
  const REFRESH_MS = 60 * 1000; // 페이지를 열어두면 1분마다 새 데이터 확인

  let state = { categories: [], updated_at: null };
  let activeTab = "전체";

  function relativeTime(dateLike){
    if(!dateLike) return "-";
    const d = new Date(dateLike);
    if(isNaN(d.getTime())) return "-";
    const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
    if(diffSec < 60) return "방금 전";
    if(diffSec < 3600) return Math.floor(diffSec/60) + "분 전";
    if(diffSec < 86400) return Math.floor(diffSec/3600) + "시간 전";
    if(diffSec < 86400*7) return Math.floor(diffSec/86400) + "일 전";
    return d.toLocaleDateString("ko-KR", { month:"short", day:"numeric" });
  }

  function sourceFromLink(link){
    try{
      const host = new URL(link).hostname.replace(/^www\./, "");
      return host;
    }catch(e){ return "출처 미확인"; }
  }

  function render(){
    const tabsEl = document.getElementById("tabs");
    const listEl = document.getElementById("list");
    const emptyEl = document.getElementById("emptyState");
    const cats = state.categories || [];
    const hasData = cats.some(c => (c.items || []).length > 0);

    // 탭 구성: 전체 + 키워드별
    const tabNames = ["전체", ...cats.map(c => c.keyword)];
    tabsEl.innerHTML = "";
    tabNames.forEach(name => {
      const count = name === "전체"
        ? cats.reduce((sum,c)=> sum + (c.items||[]).length, 0)
        : (cats.find(c=>c.keyword===name)?.items.length || 0);
      const btn = document.createElement("button");
      btn.className = "tab";
      btn.setAttribute("role","tab");
      btn.setAttribute("aria-selected", String(name === activeTab));
      btn.innerHTML = `${name}<span class="count">${count}</span>`;
      btn.addEventListener("click", () => { activeTab = name; render(); });
      tabsEl.appendChild(btn);
    });

    // 목록 구성
    let items = [];
    if(activeTab === "전체"){
      cats.forEach(c => (c.items||[]).forEach(it => items.push(it)));
      items.sort((a,b) => new Date(b.pub_date) - new Date(a.pub_date));
    } else {
      const cat = cats.find(c => c.keyword === activeTab);
      items = cat ? cat.items.slice() : [];
    }

    listEl.innerHTML = "";
    if(!hasData || items.length === 0){
      emptyEl.hidden = false;
      listEl.hidden = true;
    } else {
      emptyEl.hidden = true;
      listEl.hidden = false;
      items.forEach((it, i) => {
        const row = document.createElement("article");
        row.className = "item";
        row.innerHTML = `
          <div class="idx">${String(i+1).padStart(2,"0")}</div>
          <div>
            <a class="headline" href="${it.link || it.naver_link || '#'}" target="_blank" rel="noopener noreferrer">${it.title}</a>
            ${it.description ? `<div class="desc">${it.description}</div>` : ""}
            <div class="meta-line">
              <span class="src">${sourceFromLink(it.link || it.naver_link || "")}</span>
              <span class="sep">·</span>
              <span title="${it.pub_date || ''}">${relativeTime(it.pub_date)}</span>
            </div>
          </div>
        `;
        listEl.appendChild(row);
      });
    }

    // 상태 표시
    document.getElementById("dateLine").textContent =
      new Date().toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
    document.getElementById("updatedAt").textContent =
      "마지막 업데이트: " + (state.updated_at ? relativeTime(state.updated_at) : "-");
    const dot = document.getElementById("liveDot");
    const label = document.getElementById("liveLabel");
    if(hasData){
      dot.classList.remove("off");
      label.textContent = "자동 갱신 중";
    } else {
      dot.classList.add("off");
      label.textContent = "대기 중";
    }
  }

  async function load(){
    try{
      const res = await fetch(DATA_URL + "?_=" + Date.now(), { cache: "no-store" });
      if(!res.ok) throw new Error("data fetch failed");
      state = await res.json();
    }catch(e){
      console.warn("뉴스 데이터를 불러오지 못했습니다:", e);
    }
    render();
  }

  load();
  setInterval(load, REFRESH_MS);
  setInterval(render, 30 * 1000); // 상대 시간(n분 전) 표시를 주기적으로 갱신

  /* =========================================================
     설정 패널: 검색어 / 갱신 주기를 GitHub API로 직접 저장
     ========================================================= */
  const TOKEN_KEY = "naver_news_gh_token";
  let draftKeywords = [];

  function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
  function setStoredToken(t){ localStorage.setItem(TOKEN_KEY, t); }
  function clearStoredToken(){ localStorage.removeItem(TOKEN_KEY); }

  function getOwnerRepo(){
    // GitHub Pages 프로젝트 페이지 주소(https://{owner}.github.io/{repo}/)에서
    // 저장소 소유자/이름을 자동으로 추출합니다.
    const owner = location.hostname.split(".")[0];
    const repo = location.pathname.split("/").filter(Boolean)[0] || "";
    return { owner, repo };
  }

  function utf8ToBase64(str){
    return btoa(unescape(encodeURIComponent(str)));
  }

  async function ghRequest(path, options = {}){
    const { owner, repo } = getOwnerRepo();
    const token = getToken();
    return fetch(`https://api.github.com/repos/${owner}/${repo}/${path}`, {
      ...options,
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: "application/vnd.github+json",
        ...(options.headers || {}),
      },
    });
  }

  function setStatus(msg, type){
    const el = document.getElementById("settingsStatus");
    el.textContent = msg;
    el.className = "status-msg " + (type || "");
  }

  function renderChips(){
    const wrap = document.getElementById("keywordChips");
    wrap.innerHTML = "";
    draftKeywords.forEach((kw, i) => {
      const chip = document.createElement("span");
      chip.className = "chip";
      const safe = kw.replace(/</g, "&lt;");
      chip.innerHTML = `${safe}<button type="button" aria-label="${safe} 삭제" data-i="${i}">✕</button>`;
      wrap.appendChild(chip);
    });
    wrap.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        draftKeywords.splice(Number(btn.dataset.i), 1);
        renderChips();
      });
    });
  }

  function addKeywordFromInput(){
    const input = document.getElementById("keywordInput");
    const val = input.value.trim();
    if(val && !draftKeywords.includes(val)){
      draftKeywords.push(val);
      renderChips();
    }
    input.value = "";
  }

  async function loadConfigIntoForm(){
    let cfg = { keywords: ["경제", "AI", "부동산"], interval_hours: 1 };
    try{
      const res = await fetch("./config.json?_=" + Date.now(), { cache: "no-store" });
      if(res.ok) cfg = await res.json();
    }catch(e){ /* 기본값 사용 */ }
    draftKeywords = (cfg.keywords || []).slice();
    renderChips();
    document.getElementById("intervalSelect").value = String(cfg.interval_hours || 1);
  }

  function updateConnectionUI(){
    const connected = !!getToken();
    document.getElementById("tokenConnected").hidden = !connected;
    document.getElementById("tokenForm").hidden = connected;
    document.getElementById("saveSettingsBtn").disabled = !connected;
    document.getElementById("runNowBtn").disabled = !connected;
  }

  async function saveSettings(){
    if(!getToken()) return;
    const saveBtn = document.getElementById("saveSettingsBtn");
    saveBtn.disabled = true;
    setStatus("저장 중…", "info");
    try{
      let sha;
      const getRes = await ghRequest("contents/config.json");
      if(getRes.ok){
        const j = await getRes.json();
        sha = j.sha;
      } else if(getRes.status !== 404){
        throw new Error(`설정 파일을 불러오지 못했습니다 (${getRes.status})`);
      }

      const newConfig = {
        keywords: draftKeywords,
        interval_hours: Number(document.getElementById("intervalSelect").value),
      };
      const body = {
        message: "설정 변경 (웹페이지에서 저장)",
        content: utf8ToBase64(JSON.stringify(newConfig, null, 2)),
        branch: "main",
      };
      if(sha) body.sha = sha;

      const putRes = await ghRequest("contents/config.json", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if(!putRes.ok){
        const err = await putRes.json().catch(() => ({}));
        throw new Error(err.message || `저장 실패 (${putRes.status})`);
      }
      setStatus("저장 완료! 다음 자동 실행부터 반영돼요.", "success");
    }catch(e){
      setStatus("저장 실패: " + e.message, "error");
    }finally{
      saveBtn.disabled = false;
    }
  }

  async function runNow(){
    if(!getToken()) return;
    const runBtn = document.getElementById("runNowBtn");
    runBtn.disabled = true;
    setStatus("실행 요청 중…", "info");
    try{
      const res = await ghRequest("actions/workflows/update-news.yml/dispatches", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ref: "main", inputs: { force_run: "true" } }),
      });
      if(!res.ok){
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `실행 요청 실패 (${res.status})`);
      }
      setStatus("실행 요청됨! 1분 후 새로고침해보세요.", "success");
    }catch(e){
      setStatus("실행 실패: " + e.message, "error");
    }finally{
      runBtn.disabled = false;
    }
  }

  function openSidebar(){
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebar").setAttribute("aria-hidden", "false");
    document.getElementById("backdrop").hidden = false;
  }
  function closeSidebarFn(){
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebar").setAttribute("aria-hidden", "true");
    document.getElementById("backdrop").hidden = true;
  }

  document.getElementById("openSidebar").addEventListener("click", openSidebar);
  document.getElementById("closeSidebar").addEventListener("click", closeSidebarFn);
  document.getElementById("backdrop").addEventListener("click", closeSidebarFn);
  document.addEventListener("keydown", e => { if(e.key === "Escape") closeSidebarFn(); });

  document.getElementById("connectBtn").addEventListener("click", () => {
    const val = document.getElementById("tokenInput").value.trim();
    if(!val) return;
    setStoredToken(val);
    document.getElementById("tokenInput").value = "";
    updateConnectionUI();
    setStatus("GitHub에 연결됐어요.", "success");
  });
  document.getElementById("disconnectBtn").addEventListener("click", () => {
    clearStoredToken();
    updateConnectionUI();
    setStatus("연결이 해제됐어요.", "info");
  });
  document.getElementById("addKeywordBtn").addEventListener("click", addKeywordFromInput);
  document.getElementById("keywordInput").addEventListener("keydown", e => {
    if(e.key === "Enter"){ e.preventDefault(); addKeywordFromInput(); }
  });
  document.getElementById("saveSettingsBtn").addEventListener("click", saveSettings);
  document.getElementById("runNowBtn").addEventListener("click", runNow);

  loadConfigIntoForm();
  updateConnectionUI();
</script>

</body>
</html>
