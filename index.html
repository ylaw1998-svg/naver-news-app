<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>네이버 뉴스 자동 수집기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6F3EC;
    --paper-dim: #EFEADD;
    --ink: #1B1A17;
    --ink-soft: #46433C;
    --rule: #D8D2C4;
    --rule-strong: #1B1A17;
    --live: #03C75A;
    --alert: #B23A2F;
    --meta: #8C8775;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: inherit; text-decoration: none; }

  .wrap{
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ---------- 마스트헤드 ---------- */
  .masthead{
    display:flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    padding-bottom: 14px;
  }
  .masthead h1{
    font-family: "Noto Serif KR", serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 44px);
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .masthead .kicker{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--meta);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  .status{
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.6;
  }
  .status .dot-row{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap: 6px;
  }
  .dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(3,199,90,0.6);
    animation: pulse 2.2s infinite;
  }
  .dot.off{ background: var(--meta); animation: none; }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(3,199,90,0.45); }
    70%{ box-shadow: 0 0 0 7px rgba(3,199,90,0); }
    100%{ box-shadow: 0 0 0 0 rgba(3,199,90,0); }
  }

  .rule-double{
    border: none;
    border-top: 2px solid var(--rule-strong);
    border-bottom: 1px solid var(--rule-strong);
    height: 3px;
    margin: 0 0 18px;
  }

  /* ---------- 섹션 탭 ---------- */
  .tabs{
    display:flex;
    gap: 22px;
    overflow-x: auto;
    padding-bottom: 12px;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--rule);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--meta);
    background: none;
    border: none;
    padding: 4px 2px 12px;
    cursor: pointer;
    white-space: nowrap;
    position: relative;
  }
  .tab[aria-selected="true"]{
    color: var(--ink);
  }
  .tab[aria-selected="true"]::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height: 2px;
    background: var(--ink);
  }
  .tab:focus-visible{ outline: 2px solid var(--live); outline-offset: 3px; }
  .tab .count{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--meta);
    margin-left: 4px;
  }

  /* ---------- 기사 목록 ---------- */
  .list{ margin-top: 6px; }
  .item{
    display:grid;
    grid-template-columns: 34px 1fr;
    gap: 14px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .item:hover .headline{ text-decoration: underline; text-decoration-color: var(--rule-strong); }
  .idx{
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--meta);
    padding-top: 3px;
  }
  .headline{
    font-family: "Noto Serif KR", serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.4;
    display: block;
    margin-bottom: 6px;
  }
  .desc{
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .meta-line{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px;
    color: var(--meta);
    display:flex;
    gap: 10px;
    align-items: center;
  }
  .meta-line .src{
    color: var(--ink-soft);
    font-weight: 500;
  }
  .meta-line .sep{ color: var(--rule); }

  /* ---------- 빈 상태 ---------- */
  .empty{
    margin-top: 40px;
    padding: 40px 20px;
    text-align: center;
    border: 1px dashed var(--rule);
    background: var(--paper-dim);
  }
  .empty .stamp{
    display:inline-block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--alert);
    border: 1px solid var(--alert);
    padding: 4px 10px;
    transform: rotate(-2deg);
    margin-bottom: 14px;
  }
  .empty p{
    font-family: "Noto Serif KR", serif;
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  footer{
    margin-top: 50px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--meta);
    display:flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 480px){
    .masthead{ flex-direction: column; align-items: flex-start; }
    .status{ text-align: left; }
    .status .dot-row{ justify-content: flex-start; }
    .item{ grid-template-columns: 24px 1fr; }
    .headline{ font-size: 16.5px; }
  }

  /* ---------- 설정 토글 버튼 ---------- */
  .settings-toggle{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    padding: 5px 10px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .settings-toggle:hover{ background: var(--ink); color: var(--paper); }
  .settings-toggle:focus-visible{ outline: 2px solid var(--live); outline-offset: 2px; }

  /* ---------- 오버레이 ---------- */
  .backdrop{
    position: fixed; inset: 0;
    background: rgba(27,26,23,0.45);
    z-index: 40;
  }

  /* ---------- 사이드바 ---------- */
  .sidebar{
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: min(340px, 88vw);
    background: var(--paper);
    border-right: 1px solid var(--rule-strong);
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    z-index: 50;
    padding: 20px;
    overflow-y: auto;
    box-shadow: 6px 0 24px rgba(0,0,0,0.12);
  }
  .sidebar.open{ transform: translateX(0); }

  .sidebar-head{
    display:flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--rule-strong);
    padding-bottom: 12px;
    margin-bottom: 18px;
  }
  .sidebar-head h2{
    font-family: "Noto Serif KR", serif;
    font-size: 20px;
    margin: 0;
  }
  .icon-btn{
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--ink-soft); padding: 4px;
  }
  .icon-btn:focus-visible{ outline: 2px solid var(--live); }

  .settings-section{ margin-bottom: 24px; }
  .settings-section h3{
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--meta);
    margin: 0 0 10px;
  }

  #tokenConnected .conn-ok{
    font-size: 13px; color: var(--live); font-weight: 600;
    margin: 0 0 10px;
  }
  .sidebar label{
    display:block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .sidebar input[type="text"],
  .sidebar input[type="password"],
  .sidebar select{
    width: 100%;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13px;
    padding: 9px 10px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink);
    margin-bottom: 8px;
    box-sizing: border-box;
  }
  .sidebar input:focus-visible, .sidebar select:focus-visible{
    outline: 2px solid var(--live); outline-offset: 1px;
  }
  .hint{
    font-size: 11.5px;
    color: var(--meta);
    line-height: 1.6;
    margin: 6px 0 0;
  }
  .hint a{ color: var(--ink-soft); text-decoration: underline; }

  .chips{
    display:flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 10px;
  }
  .chip{
    display:inline-flex; align-items:center; gap: 6px;
    background: var(--paper-dim);
    border: 1px solid var(--rule);
    font-size: 12.5px;
    padding: 5px 6px 5px 10px;
  }
  .chip button{
    background:none; border:none; cursor:pointer;
    color: var(--meta); font-size: 11px; padding: 2px;
  }
  .chip button:hover{ color: var(--alert); }
  .add-row{ display:flex; gap: 6px; }
  .add-row input{ flex:1; margin-bottom:0; }
  .add-row button{ flex-shrink: 0; }

  .btn-primary, .btn-secondary{
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 14px;
    cursor: pointer;
    border: 1px solid var(--rule-strong);
  }
  .btn-primary{ background: var(--ink); color: var(--paper); }
  .btn-primary:hover:not(:disabled){ background: var(--ink-soft); }
  .btn-secondary{ background: none; color: var(--ink); }
  .btn-secondary:hover:not(:disabled){ background: var(--paper-dim); }
  .btn-primary:disabled, .btn-secondary:disabled{
    opacity: 0.4; cursor: not-allowed;
  }
  .full{ width: 100%; }

  .sidebar-actions{
    display:flex; flex-direction: column; gap: 8px;
    margin-top: 28px;
  }
  .status-msg{
    font-family: "IBM Plex Mono", monospace;
